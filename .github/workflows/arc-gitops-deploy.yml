name: arc-gitops-deploy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-via-arc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install CLI extensions
        run: |
          az extension add --name connectedk8s --upgrade --yes
          az extension add --name k8s-extension --upgrade --yes
          az extension add --name k8s-configuration --upgrade --yes

      - name: Ensure Arc connection and deploy GitOps config
        env:
          RESOURCE_GROUP: ${{ secrets.ARC_RESOURCE_GROUP }}
          CLUSTER_NAME: ${{ secrets.ARC_CLUSTER_NAME }}
          LOCATION: ${{ secrets.ARC_LOCATION }}
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          GIT_REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          GIT_BRANCH: ${{ github.ref_name }}
          MANIFEST_PATH: ./k8s
        run: |
          bash scripts/setup_arc_k8s.sh
          bash scripts/arc_gitops_deploy.sh
