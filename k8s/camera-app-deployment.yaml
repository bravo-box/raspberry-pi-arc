apiVersion: apps/v1
kind: Deployment
metadata:
  name: camera-app
  namespace: raspberry-pi-arc-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: camera-app
  template:
    metadata:
      labels:
        app: camera-app
    spec:
      # The video group (GID 44) gives libcamera/picamera2 access to
      # /dev/video* and /dev/media* device files on Ubuntu/Raspberry Pi OS.
      securityContext:
        supplementalGroups:
          - 44   # video group

      initContainers:
        # Ensure the shared outbox directory is writable by appuser (UID 1000).
        - name: init-outbox-permissions
          image: busybox:1.36
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
          command:
            - sh
            - -c
            - mkdir -p /outbox && chown 1000:1000 /outbox && chmod 0750 /outbox
          volumeMounts:
            - name: outbox
              mountPath: /outbox

      containers:
        # ------------------------------------------------------------------
        # camera-service: waits for 'TaskCamera' Service Bus messages and
        # captures JPEG images into the shared /outbox volume.
        # ------------------------------------------------------------------
        - name: camera-service
          image: camera-service:latest
          imagePullPolicy: IfNotPresent
          # The video group (GID 44) gives libcamera/picamera2 access to
          # /dev/video* and /dev/media* device files on Ubuntu/Raspberry Pi OS.
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: outbox
              mountPath: /outbox
            - name: config
              mountPath: /config
              readOnly: true
            # Camera device files – paths may vary by Pi hardware revision.
            - name: dev-video0
              mountPath: /dev/video0
            - name: dev-media0
              mountPath: /dev/media0

        # ------------------------------------------------------------------
        # file-service: polls /outbox, uploads complete files to Azure Blob
        # Storage, publishes 'photo-upload' notifications, and deletes files
        # once an acknowledgement arrives on the 'photo-processed' topic.
        # ------------------------------------------------------------------
        - name: file-service
          image: file-service:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: outbox
              mountPath: /outbox
            - name: config
              mountPath: /config
              readOnly: true

      volumes:
        # Ephemeral shared directory for in-flight image files.
        - name: outbox
          emptyDir: {}

        # config.json is stored as a Kubernetes Secret and mounted read-only.
        # Create it with:
        #   kubectl create secret generic camera-app-config \
        #     --from-file=config.json=/path/to/your/config.json \
        #     -n raspberry-pi-arc-demo
        - name: config
          secret:
            secretName: camera-app-config

        # Camera device nodes exposed from the Raspberry Pi host.
        # Adjust paths to match the actual device nodes on your hardware.
        - name: dev-video0
          hostPath:
            path: /dev/video0
            type: CharDevice
        - name: dev-media0
          hostPath:
            path: /dev/media0
            type: CharDevice
