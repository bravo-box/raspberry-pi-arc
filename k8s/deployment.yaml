apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-writer
  namespace: raspberry-pi-arc-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-writer
  template:
    metadata:
      labels:
        app: log-writer
    spec:
      initContainers:
        - name: init-log-permissions
          image: busybox:1.36
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
          command: ["sh", "-c", "mkdir -p /app/logs && chown 1000:1000 /app/logs && chmod 0755 /app/logs"]
          volumeMounts:
            - name: host-logs
              mountPath: /app/logs
      containers:
        - name: log-writer
          image: raspberry-pi-arc-demo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: LOG_DIR
              value: /app/logs
            - name: LOG_FILE
              value: demo.log
            - name: LOG_INTERVAL_SECONDS
              value: "2"
          volumeMounts:
            - name: host-logs
              mountPath: /app/logs
      volumes:
        # hostPath is intentional for this Raspberry Pi demo so logs are directly visible on the local filesystem.
        - name: host-logs
          hostPath:
            path: /var/lib/raspberry-pi-arc/logs
            type: DirectoryOrCreate
