apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "camera-app.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "camera-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "camera-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "camera-app.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}

      initContainers:
        # Ensure the shared outbox directory is writable by appuser (UID 1000).
        - name: init-outbox-permissions
          image: "{{ .Values.images.busybox.repository }}:{{ .Values.images.busybox.tag }}"
          imagePullPolicy: {{ .Values.images.busybox.pullPolicy }}
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
          command:
            - sh
            - -c
            - mkdir -p /outbox && chown 1000:1000 /outbox && chmod 0750 /outbox
          volumeMounts:
            - name: outbox
              mountPath: /outbox

        # Copy the read-only Secret into the writable config-data emptyDir so
        # that registration-service can persist device-registration.json there.
        - name: init-config
          image: "{{ .Values.images.busybox.repository }}:{{ .Values.images.busybox.tag }}"
          imagePullPolicy: {{ .Values.images.busybox.pullPolicy }}
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
          command:
            - sh
            - -c
            - cp /config-secret/config.json /config/config.json && chown -R 1000:1000 /config
          volumeMounts:
            - name: config-secret
              mountPath: /config-secret
              readOnly: true
            - name: config-data
              mountPath: /config

      containers:
        # ----------------------------------------------------------------
        # camera-service: subscribes to 'TaskCamera' and captures images.
        # ----------------------------------------------------------------
        - name: camera-service
          image: "{{ .Values.images.cameraService.repository }}:{{ .Values.images.cameraService.tag }}"
          imagePullPolicy: {{ .Values.images.cameraService.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: outbox
              mountPath: /outbox
            - name: config-data
              mountPath: /config
              readOnly: true
            - name: dev-video0
              mountPath: /dev/video0
            - name: dev-media0
              mountPath: /dev/media0

        # ----------------------------------------------------------------
        # file-service: uploads images and manages acknowledgements.
        # ----------------------------------------------------------------
        - name: file-service
          image: "{{ .Values.images.fileService.repository }}:{{ .Values.images.fileService.tag }}"
          imagePullPolicy: {{ .Values.images.fileService.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: outbox
              mountPath: /outbox
            - name: config-data
              mountPath: /config
              readOnly: true

        # ----------------------------------------------------------------
        # registration-service: registers device on first boot and sends
        # health-check heartbeats every 30 seconds.
        # ----------------------------------------------------------------
        - name: registration-service
          image: "{{ .Values.images.registrationService.repository }}:{{ .Values.images.registrationService.tag }}"
          imagePullPolicy: {{ .Values.images.registrationService.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: HEALTH_CHECK_INTERVAL
              value: {{ .Values.registrationService.healthCheckIntervalSeconds | quote }}
            - name: REGISTRATION_SUBSCRIPTION
              value: {{ .Values.registrationService.registrationSubscription | quote }}
          volumeMounts:
            # Mounted read-write so device-registration.json can be persisted.
            - name: config-data
              mountPath: /config

      volumes:
        # Ephemeral shared directory for in-flight image files.
        - name: outbox
          emptyDir: {}

        # The Kubernetes Secret is projected here (read-only). An initContainer
        # copies config.json into config-data so services can read it, and the
        # registration-service can write device-registration.json alongside it.
        - name: config-secret
          secret:
            secretName: {{ .Values.configSecretName }}
        - name: config-data
          emptyDir: {}

        # Camera device nodes exposed from the Raspberry Pi host.
        - name: dev-video0
          hostPath:
            path: {{ .Values.cameraDevices.video0 }}
            type: CharDevice
        - name: dev-media0
          hostPath:
            path: {{ .Values.cameraDevices.media0 }}
            type: CharDevice
